services:
  - type: web
    name: et-markets-ai
    runtime: python

    plan: free

    rootDir: app

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: GEMINI_API_KEY
        sync: false